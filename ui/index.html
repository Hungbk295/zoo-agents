<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>open-zoo</title>
  <style>
    /* ── Catppuccin Latte – Pink-tinted ── */
    :root {
      /* accents: all pink spectrum */
      --ctp-rosewater: #dc8a78;
      --ctp-flamingo: #dd7878;
      --ctp-pink: #ea76cb;
      --ctp-mauve: #8839ef;
      --ctp-red: #d20f39;
      --ctp-maroon: #e64553;
      --ctp-peach: #fe640b;
      --ctp-yellow: #df8e1d;
      --ctp-green: #40a02b;
      --ctp-teal: #179299;
      --ctp-sky: #04a5e5;
      --ctp-sapphire: #209fb5;
      --ctp-blue: #1e66f5;
      --ctp-lavender: #7287fd;
      /* warm-shifted neutrals */
      --ctp-text: #5c4a52;
      --ctp-subtext1: #6e5a63;
      --ctp-subtext0: #806b74;
      --ctp-overlay2: #937e87;
      --ctp-overlay1: #a5919a;
      --ctp-overlay0: #b5a3ab;
      --ctp-surface2: #c9b8bf;
      --ctp-surface1: #d6c8ce;
      --ctp-surface0: #e2d6db;
      --ctp-base: #f8f2f4;
      --ctp-mantle: #f1e8ec;
      --ctp-crust: #e9dde2;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--ctp-base);
      color: var(--ctp-text);
    }

    /* ── Header ── */
    header {
      padding: 20px 28px;
      background: var(--ctp-mantle);
      border-bottom: 1px solid var(--ctp-surface0);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-title-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--ctp-rosewater);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
    .header-logo svg {
      width: 20px;
      height: 20px;
      color: #fff;
    }
    h1 {
      margin: 0 0 2px 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--ctp-text);
    }
    header p {
      margin: 0;
      color: var(--ctp-subtext0);
      font-size: 13px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .settings-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--ctp-surface1);
      background: var(--ctp-base);
      color: var(--ctp-subtext0);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .settings-btn:hover {
      background: var(--ctp-crust);
      border-color: var(--ctp-rosewater);
      color: var(--ctp-rosewater);
    }
    .settings-btn svg {
      width: 20px;
      height: 20px;
    }
    .status {
      color: var(--ctp-rosewater);
      font-size: 13px;
      min-height: 20px;
      font-weight: 500;
    }

    /* ── Filters ── */
    .wrap {
      padding: 20px 28px 32px;
    }
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-btn {
      border: 1px solid var(--ctp-surface1);
      background: var(--ctp-mantle);
      color: var(--ctp-subtext1);
      padding: 7px 14px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .filter-btn:hover {
      border-color: var(--ctp-rosewater);
      background: rgba(220, 138, 120, 0.08);
      color: var(--ctp-text);
    }
    .filter-btn.active {
      background: var(--ctp-rosewater);
      border-color: var(--ctp-rosewater);
      color: #fff;
    }
    .filter-btn > svg {
      flex: 0 0 auto;
    }

    /* ── Board ── */
    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 16px;
    }
    .column {
      background: var(--ctp-mantle);
      border: 1px solid var(--ctp-surface0);
      border-radius: 16px;
      min-height: 320px;
      padding: 16px;
      transition: border-color 0.2s, background 0.2s;
    }
    .column.drag-over {
      border-color: var(--ctp-rosewater);
      background: rgba(220, 138, 120, 0.08);
    }
    .column-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .column-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      flex: 0 0 auto;
    }
    .column h2 {
      margin: 0;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: var(--ctp-subtext0);
    }
    .column-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--ctp-overlay0);
      background: var(--ctp-surface0);
      padding: 1px 7px;
      border-radius: 999px;
      margin-left: auto;
    }
    .column-body {
      min-height: 240px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Cards ── */
    .card {
      border: 1px solid var(--ctp-surface0);
      border-radius: 12px;
      background: var(--ctp-base);
      padding: 0;
      cursor: grab;
      transition: box-shadow 0.2s, border-color 0.2s;
      overflow: hidden;
    }
    .card:hover {
      box-shadow: 0 2px 12px rgba(140, 90, 100, 0.1);
      border-color: var(--ctp-surface1);
    }
    .card:active {
      cursor: grabbing;
      box-shadow: 0 4px 20px rgba(140, 90, 100, 0.15);
    }
    .card-accent {
      height: 3px;
      width: 100%;
    }
    .card-body {
      padding: 14px;
    }
    .card-top-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-pm-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
    .card-pm-icon svg {
      width: 18px;
      height: 18px;
      color: #fff;
    }
    .card-title {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--ctp-text);
      flex: 1;
    }
    .card-divider {
      height: 1px;
      background: var(--ctp-surface0);
      margin: 0 0 10px;
    }
    .card-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .card-info-label {
      color: var(--ctp-overlay0);
      font-weight: 500;
    }
    .card-info-value {
      color: var(--ctp-text);
      font-weight: 500;
      text-align: right;
    }
    .meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 11px;
      font-weight: 500;
    }
    .pill {
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--ctp-crust);
      color: var(--ctp-subtext0);
    }
    .pill-repo {
      color: #fff;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .pill-repo svg {
      width: 12px;
      height: 12px;
    }
    .pill-priority-high {
      background: rgba(230, 69, 83, 0.12);
      color: var(--ctp-maroon);
    }
    .pill-priority-medium {
      background: rgba(221, 120, 120, 0.12);
      color: var(--ctp-flamingo);
    }
    .pill-priority-low {
      background: rgba(220, 138, 120, 0.12);
      color: var(--ctp-rosewater);
    }
    .notes {
      margin: 10px 0 0;
      white-space: pre-wrap;
      color: var(--ctp-subtext1);
      font-size: 12px;
      line-height: 1.5;
      padding: 8px 10px;
      background: var(--ctp-mantle);
      border-radius: 8px;
      border-left: 3px solid var(--ctp-rosewater);
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--ctp-surface0);
    }
    .card-owner {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--ctp-subtext0);
      font-weight: 500;
    }
    .card-owner-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
    .card-owner-icon svg {
      width: 13px;
      height: 13px;
      color: #fff;
    }
    .rd {
      font-size: 11px;
      color: var(--ctp-rosewater);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      text-decoration: none;
    }
    .rd svg {
      width: 13px;
      height: 13px;
      flex: 0 0 auto;
    }
    .empty {
      color: var(--ctp-overlay0);
      font-size: 13px;
      padding: 8px 2px;
      text-align: center;
      font-style: italic;
    }

    /* ── Modal ── */
    .pm-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(140, 90, 100, 0.3);
      backdrop-filter: blur(4px);
      z-index: 200;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .pm-modal-overlay.active {
      display: flex;
    }
    .pm-modal {
      width: min(1040px, 100%);
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      background: var(--ctp-base);
      border: 1px solid var(--ctp-surface0);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(140, 90, 100, 0.18);
    }
    .pm-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--ctp-surface0);
      background: var(--ctp-mantle);
    }
    .pm-modal-header h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      color: var(--ctp-text);
    }
    .pm-modal-close {
      width: 32px;
      height: 32px;
      border: 0;
      background: var(--ctp-surface0);
      color: var(--ctp-subtext0);
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .pm-modal-close:hover {
      background: rgba(220, 138, 120, 0.15);
      color: var(--ctp-rosewater);
    }
    .pm-modal-close svg {
      width: 16px;
      height: 16px;
    }
    .pm-modal-body {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 0;
      flex: 1;
    }
    .pm-agent-list {
      border-right: 1px solid var(--ctp-surface0);
      padding: 12px;
      overflow: auto;
      background: var(--ctp-mantle);
    }
    .pm-agent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 6px;
      background: transparent;
      transition: all 0.15s;
    }
    .pm-agent-item:hover {
      background: rgba(220, 138, 120, 0.06);
      border-color: var(--ctp-rosewater);
    }
    .pm-agent-item.active {
      background: var(--ctp-base);
      border-color: var(--ctp-rosewater);
      box-shadow: 0 1px 6px rgba(220, 138, 120, 0.15);
    }
    .pm-agent-face {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      object-fit: cover;
      flex: 0 0 auto;
      border: 2px solid var(--ctp-surface0);
    }
    .pm-agent-name {
      font-size: 14px;
      color: var(--ctp-text);
      font-weight: 600;
    }
    .pm-agent-sub {
      font-size: 12px;
      color: var(--ctp-subtext0);
    }
    .pm-skills-panel {
      padding: 20px;
      overflow: auto;
    }
    .pm-skills-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .pm-skills-avatar {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      object-fit: cover;
      border: 3px solid var(--ctp-surface0);
      flex: 0 0 auto;
    }
    .pm-skills-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--ctp-text);
    }
    .pm-skills-project {
      font-size: 12px;
      color: var(--ctp-subtext0);
      margin-top: 3px;
    }
    .pm-section-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ctp-rosewater);
      font-weight: 600;
      margin: 20px 0 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pm-section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--ctp-surface0);
    }
    .pm-file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .pm-file-item {
      border: 1px solid var(--ctp-surface0);
      border-radius: 12px;
      overflow: hidden;
      background: var(--ctp-mantle);
      transition: border-color 0.2s;
    }
    .pm-file-item:hover {
      border-color: var(--ctp-rosewater);
    }
    .pm-file-item.expanded {
      border-color: var(--ctp-rosewater);
    }
    .pm-file-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      cursor: pointer;
    }
    .pm-file-name {
      font-size: 13px;
      color: var(--ctp-text);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pm-file-name svg {
      width: 16px;
      height: 16px;
      color: var(--ctp-overlay0);
      flex: 0 0 auto;
    }
    .pm-file-open {
      color: var(--ctp-rosewater);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      flex: 0 0 auto;
      transition: color 0.15s;
    }
    .pm-file-open:hover {
      color: var(--ctp-flamingo);
    }
    .pm-file-body {
      display: none;
      border-top: 1px solid var(--ctp-surface0);
      padding: 14px;
      background: var(--ctp-base);
    }
    .pm-file-body pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--ctp-text);
    }
    .pm-skills-empty {
      color: var(--ctp-overlay0);
      font-size: 13px;
      padding: 4px 0;
      font-style: italic;
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .board {
        grid-template-columns: 1fr 1fr;
      }
      .pm-modal-body {
        grid-template-columns: 1fr;
      }
      .pm-agent-list {
        border-right: 0;
        border-bottom: 1px solid var(--ctp-surface0);
      }
    }
    @media (max-width: 700px) {
      .board {
        grid-template-columns: 1fr;
      }
      .header-right {
        width: 100%;
        justify-content: space-between;
      }
      .wrap {
        padding: 16px 16px 28px;
      }
      header {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title-group">
      <div class="header-logo">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0V12a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 12V5.25" /></svg>
      </div>
      <div>
        <h1>open-zoo</h1>
        <p>Local board for Ads, Research, Builder, and Academic.</p>
      </div>
    </div>
    <div class="header-right">
      <div class="status" id="status"></div>
      <button class="settings-btn" id="settings-btn" title="Project manager settings">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z" /></svg>
      </button>
    </div>
  </header>

  <div class="wrap">
    <div class="filters" id="filters"></div>
    <div class="board" id="board"></div>
  </div>

  <div class="pm-modal-overlay" id="pm-modal-overlay">
    <div class="pm-modal">
      <div class="pm-modal-header">
        <h2>Project managers</h2>
        <button class="pm-modal-close" id="pm-modal-close"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg></button>
      </div>
      <div class="pm-modal-body">
        <div class="pm-agent-list" id="pm-agent-list"></div>
        <div class="pm-skills-panel" id="pm-skills-panel"></div>
      </div>
    </div>
  </div>

  <script>
    const API = "/api";
    const PM_ORDER = ["ads", "research", "builder", "academic"];
    const STATUSES = ["todo", "scoped", "in_progress", "review"];
    const STATUS_LABELS = {
      todo: "Todo",
      scoped: "Scoped",
      in_progress: "In Progress",
      review: "Review"
    };

    let repos = {};
    let allData = {};
    let skillsData = {};
    let activeRepo = "all";
    let activePm = null;
    let dragging = null;

    const CTP_REPO_COLORS = {
      ads: "#dd7878",       /* Flamingo */
      research: "#ea76cb",  /* Pink */
      builder: "#dc8a78",   /* Rosewater */
      academic: "#8839ef"   /* Mauve */
    };

    const STATUS_COLORS = {
      todo: "#b5a3ab",       /* warm Overlay0 */
      scoped: "#ea76cb",     /* Pink */
      in_progress: "#dd7878", /* Flamingo */
      review: "#dc8a78"      /* Rosewater */
    };

    /* Heroicons – one per PM */
    const PM_ICONS = {
      ads: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 1 1 0-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38a.75.75 0 0 1-1.021-.29l-.112-.195a24.84 24.84 0 0 1-1.455-3.306M10.34 6.66a24.89 24.89 0 0 0 1.453-3.306l.112-.195a.75.75 0 0 1 1.021-.29l.657.38c.523.302.71.962.463 1.511a24.9 24.9 0 0 1-.985 2.783m0 9.18c4.012.354 7.72 1.493 10.582 3.24A1.313 1.313 0 0 0 24 15.84V8.16a1.313 1.313 0 0 0-3.078-1.08C18.06 8.83 14.352 9.97 10.34 10.32" /></svg>',
      research: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" /></svg>',
      builder: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.049.58.025 1.193-.14 1.743" /></svg>',
      academic: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a23.838 23.838 0 0 0-1.012 5.434c3.58.85 7.264 1.316 11.006 1.316 3.742 0 7.426-.466 11.006-1.316a23.838 23.838 0 0 0-1.012-5.434m-15.482 0A60.657 60.657 0 0 1 12 9.75a60.657 60.657 0 0 1 7.74.397M12 2.25 2.25 7.5l9.75 5.25 9.75-5.25L12 2.25Z" /></svg>'
    };

    function showStatus(message, isError = false) {
      const status = document.getElementById("status");
      status.textContent = message;
      status.style.color = isError ? "#d20f39" : "#dc8a78";
      if (message) {
        window.clearTimeout(showStatus.timer);
        showStatus.timer = window.setTimeout(() => {
          status.textContent = "";
        }, 1800);
      }
    }

    function avatarFor(name) {
      return `/avatars/${name}.svg?v=1`;
    }

    function repoNames() {
      return PM_ORDER.filter((name) => repos[name]);
    }

    function repoColor(repo) {
      return CTP_REPO_COLORS[repo] || repos[repo]?.color || "#dc8a78";
    }

    function repoLabel(repo) {
      return repo.toUpperCase();
    }

    function filteredItems() {
      const names = activeRepo === "all" ? repoNames() : [activeRepo];
      return names.flatMap((name) =>
        (allData[name]?.backlog || []).map((item) => ({ ...item, repo: name }))
      );
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderFilters() {
      const filters = document.getElementById("filters");
      const names = ["all", ...repoNames()];
      filters.innerHTML = names.map((name) => {
        const label = name === "all" ? "All" : repoLabel(name);
        const active = name === activeRepo ? "active" : "";
        const icon = name === "all"
          ? '<svg style="width:16px;height:16px" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" /></svg>'
          : `<span style="display:inline-flex;width:18px;height:18px;border-radius:6px;background:${active ? "rgba(255,255,255,0.25)" : repoColor(name)};align-items:center;justify-content:center;flex:0 0 auto"><svg style="width:12px;height:12px;color:#fff" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">${pmIcon(name).match(/<path[^>]*\/>/)?.[0] || ""}</svg></span>`;
        return `<button class="filter-btn ${active}" data-repo="${name}">${icon}<span>${label}</span></button>`;
      }).join("");

      filters.querySelectorAll("[data-repo]").forEach((button) => {
        button.addEventListener("click", () => {
          activeRepo = button.dataset.repo;
          renderFilters();
          renderBoard();
        });
      });
    }

    function priorityClass(priority) {
      const p = (priority || "").toLowerCase();
      if (p === "high" || p === "p0" || p === "critical") return "pill-priority-high";
      if (p === "medium" || p === "p1") return "pill-priority-medium";
      return "pill-priority-low";
    }

    function pmIcon(repo) {
      return PM_ICONS[repo] || PM_ICONS.builder;
    }

    function makeCard(item) {
      const color = repoColor(item.repo);
      const rdHtml = item.rd
        ? `<span class="rd"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg>${escapeHtml(item.rd)}</span>`
        : "";
      return `
        <div class="card" draggable="true" data-id="${item.id}" data-repo="${item.repo}">
          <div class="card-accent" style="background:${color}"></div>
          <div class="card-body">
            <div class="card-top-row">
              <div class="card-pm-icon" style="background:${color}">${pmIcon(item.repo)}</div>
              <div class="card-title">${escapeHtml(item.title)}</div>
            </div>
            <div class="meta">
              <span class="pill pill-repo" style="background:${color}">${escapeHtml(item.repo.toUpperCase())}</span>
              <span class="pill ${priorityClass(item.priority)}">${escapeHtml(item.priority)}</span>
            </div>
            ${item.notes ? `<p class="notes">${escapeHtml(item.notes)}</p>` : ""}
            <div class="card-footer">
              ${rdHtml}
            </div>
          </div>
        </div>
      `;
    }

    function renderBoard() {
      const board = document.getElementById("board");
      const items = filteredItems();
      board.innerHTML = STATUSES.map((status) => {
        const cards = items.filter((item) => item.status === status);
        const dotColor = STATUS_COLORS[status] || "#9ca0b0";
        return `
          <section class="column" data-status="${status}">
            <div class="column-header">
              <div class="column-dot" style="background:${dotColor}"></div>
              <h2>${STATUS_LABELS[status]}</h2>
              <span class="column-count">${cards.length}</span>
            </div>
            <div class="column-body">
              ${cards.length ? cards.map(makeCard).join("") : '<div class="empty">No tasks yet</div>'}
            </div>
          </section>
        `;
      }).join("");

      board.querySelectorAll(".card").forEach((card) => {
        card.addEventListener("dragstart", () => {
          dragging = {
            id: Number(card.dataset.id),
            repo: card.dataset.repo
          };
        });
        card.addEventListener("dragend", () => {
          dragging = null;
        });
      });

      board.querySelectorAll(".column").forEach((column) => {
        column.addEventListener("dragover", (event) => {
          event.preventDefault();
          column.classList.add("drag-over");
        });
        column.addEventListener("dragleave", () => {
          column.classList.remove("drag-over");
        });
        column.addEventListener("drop", async (event) => {
          event.preventDefault();
          column.classList.remove("drag-over");
          if (!dragging) return;
          await moveTask(dragging.repo, dragging.id, column.dataset.status);
        });
      });
    }

    async function moveTask(repoName, taskId, newStatus) {
      const repoData = allData[repoName];
      if (!repoData) return;
      const task = repoData.backlog.find((item) => Number(item.id) === Number(taskId));
      if (!task || task.status === newStatus) return;

      task.status = newStatus;
      renderBoard();

      try {
        const response = await fetch(`${API}/data/${repoName}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(repoData)
        });
        if (!response.ok) throw new Error("save failed");
        showStatus("Saved");
      } catch (error) {
        showStatus("Save failed", true);
      }
    }

    async function loadSkills() {
      const response = await fetch(`${API}/skills`);
      skillsData = await response.json();
    }

    function makeFileItem(path, name) {
      const cursorLink = `cursor://file/${encodeURI(path)}`;
      return `
        <div class="pm-file-item" data-path="${escapeHtml(path)}">
          <div class="pm-file-header">
            <span class="pm-file-name"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg>${escapeHtml(name)}</span>
            <a class="pm-file-open" href="${cursorLink}" onclick="event.stopPropagation()">Open</a>
          </div>
          <div class="pm-file-body"></div>
        </div>
      `;
    }

    const PM_DESCRIPTIONS = {
      ads: "Ads & Campaigns",
      research: "Research & Analysis",
      builder: "Build & Automation",
      academic: "Academic Papers"
    };

    function renderPmList() {
      const list = document.getElementById("pm-agent-list");
      list.innerHTML = repoNames().map((repo) => `
        <div class="pm-agent-item ${repo === activePm ? "active" : ""}" data-pm="${repo}">
          <div class="card-pm-icon" style="background:${repoColor(repo)}">${pmIcon(repo)}</div>
          <div>
            <div class="pm-agent-name">${repo.charAt(0).toUpperCase() + repo.slice(1)}</div>
            <div class="pm-agent-sub">${PM_DESCRIPTIONS[repo] || "Project manager"}</div>
          </div>
        </div>
      `).join("");

      list.querySelectorAll("[data-pm]").forEach((item) => {
        item.addEventListener("click", () => {
          activePm = item.dataset.pm;
          renderPmList();
          renderPmPanel();
        });
      });
    }

    function renderPmPanel() {
      const repo = activePm;
      const panel = document.getElementById("pm-skills-panel");
      const repoRoot = repos[repo]?.root || "";
      const repoSkills = skillsData[repo] || [];
      const sharedSkills = skillsData.shared || [];
      const agentsPath = `${repoRoot}/AGENTS.md`;
      const repoSkillHtml = repoSkills.length
        ? `<div class="pm-file-list">${repoSkills.map((skill) => makeFileItem(skill.path, skill.file)).join("")}</div>`
        : '<div class="pm-skills-empty">No project skills yet.</div>';
      const sharedSkillHtml = sharedSkills.length
        ? `<div class="pm-file-list">${sharedSkills.map((skill) => makeFileItem(skill.path, skill.file)).join("")}</div>`
        : '<div class="pm-skills-empty">No shared skills yet.</div>';

      panel.innerHTML = `
        <div class="pm-skills-header">
          <div class="card-pm-icon" style="background:${repoColor(repo)};width:48px;height:48px;border-radius:14px"><svg style="width:24px;height:24px;color:#fff" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">${pmIcon(repo).match(/<path[^>]*\/>/)?.[0] || ""}</svg></div>
          <div>
            <div class="pm-skills-name">${repo.charAt(0).toUpperCase() + repo.slice(1)}</div>
            <div class="pm-skills-project">${escapeHtml(repoRoot.replace(/.*\/projects\//, "projects/"))}</div>
          </div>
        </div>
        <div class="pm-section-label">Instructions</div>
        <div class="pm-file-list">${makeFileItem(agentsPath, "AGENTS.md")}</div>
        <div class="pm-section-label">Project skills</div>
        ${repoSkillHtml}
        <div class="pm-section-label">Shared meta skills</div>
        ${sharedSkillHtml}
      `;
    }

    function openPmModal() {
      activePm = activePm || repoNames()[0] || null;
      renderPmList();
      renderPmPanel();
      document.getElementById("pm-modal-overlay").classList.add("active");
    }

    function closePmModal() {
      document.getElementById("pm-modal-overlay").classList.remove("active");
    }

    document.getElementById("pm-skills-panel").addEventListener("click", async (event) => {
      if (event.target.closest(".pm-file-open")) return;
      const header = event.target.closest(".pm-file-header");
      if (!header) return;

      const item = header.closest(".pm-file-item");
      const body = item.querySelector(".pm-file-body");
      const path = item.dataset.path;
      const isExpanded = item.classList.toggle("expanded");
      body.style.display = isExpanded ? "block" : "none";

      if (isExpanded && !body.dataset.loaded) {
        body.innerHTML = "<pre>loading...</pre>";
        try {
          const response = await fetch(`${API}/file?path=${encodeURIComponent(path)}`);
          const data = await response.json();
          body.innerHTML = `<pre>${escapeHtml(data.content || "")}</pre>`;
          body.dataset.loaded = "1";
        } catch {
          body.innerHTML = "<pre>failed to load</pre>";
        }
      }
    });

    document.getElementById("settings-btn").addEventListener("click", openPmModal);
    document.getElementById("pm-modal-close").addEventListener("click", closePmModal);
    document.getElementById("pm-modal-overlay").addEventListener("click", (event) => {
      if (event.target === document.getElementById("pm-modal-overlay")) closePmModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closePmModal();
    });

    async function boot() {
      const [reposRes, dataRes] = await Promise.all([
        fetch(`${API}/repos`),
        fetch(`${API}/data`),
        loadSkills()
      ]);
      repos = await reposRes.json();
      allData = await dataRes.json();
      renderFilters();
      renderBoard();
    }

    boot().catch(() => showStatus("Load failed", true));
  </script>
</body>
</html>
